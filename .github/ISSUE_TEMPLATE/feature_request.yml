name: 🚀 Feature Request
description: Propose a new idea or enhancement for the Sovereign Network.
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request
        Please ensure you link this feature to a parent Epic using the native GitHub sub-issue interface after creation.
  - type: input
    id: summary
    attributes:
      label: Feature Summary
      placeholder: e.g., Implement end-to-end encryption for Whisper
    validations:
      required: true
  - type: textarea
    id: user_story
    attributes:
      label: User Story
      placeholder: As a user, I want [goal] so that [benefit].
  - type: dropdown
    id: impact
    attributes:
      label: Expected Impact
      options:
        - High (Core Functionality)
        - Medium (Quality of Life)
        - Low (Minor UI/UX)
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: List the 'Must-Haves' for completion.
      placeholder: |
        - Requirement 1
        - Requirement 2
    validations:
      required: true
