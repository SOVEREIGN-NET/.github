name: Bug Report
description: Report a technical defect or test failure.
title: ": "
labels: ["bug"]
projects: "SOVEREIGN-NET/8"
body:
  - type: textarea
    id: current_behavior
    attributes:
      label: Current Behavior
      description: What is the application doing incorrectly?
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should the application be doing instead?
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Please provide an ordered list of steps to replicate this issue.
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment Details
      description: OS, Browser, Version, etc.
    validations:
      required: true
