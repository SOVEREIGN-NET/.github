name: 🏛️ Strategic Epic
description: Create a parent ticket for a large-scale project initiative.
title: "[EPIC] "
labels: ["epic", "strategic"]
body:
  - type: markdown
    attributes:
      value: |
        ## Epic Definition
        Please provide the strategic context for this epic. This will serve as the guiding document for all nested sub-issues.
  - type: textarea
    id: executive_summary
    attributes:
      label: Executive Summary
      description: A high-level overview of what this epic aims to achieve and why it is important to the Sovereign Network architecture.
    validations:
      required: true
  - type: textarea
    id: scope_boundaries
    attributes:
      label: Scope & Boundaries
      description: What is explicitly included in this epic? What is explicitly excluded?
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: What conditions must be met for this epic to be considered complete?
    validations:
      required: true
