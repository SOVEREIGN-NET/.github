name: 📦 Release Checklist
description: The final gate before production deployment.
title: "[Release] "
labels: ["release-gate"]
body:
  - type: markdown
    attributes:
      value: |
        ## Release Verification
        Please complete the following checks before authorizing a production deployment.
  - type: checkboxes
    id: qa_check
    attributes:
      label: Quality Assurance
      options:
        - label: Unit tests passed
        - label: Integration tests passed in staging
        - label: Design review approved
  - type: checkboxes
    id: infra_check
    attributes:
      label: Infrastructure
      options:
        - label: Environment variables updated
        - label: Database migrations verified
